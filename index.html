<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DePew Designs - Artistry and Engineering</title>
    <style>
        /* --- General Styles --- */
        body {
            font-family: 'Times New Roman', Times, serif; /* Serfif font matching the logo */
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #333;
            line-height: 1.6;
        }

        /* --- Main Container --- */
        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* --- Header Section (Logo and Title) --- */
        .header {
            display: flex;
            align-items: flex-start;
            margin-bottom: 40px;
        }

        .logo-text {
            font-size: 64px;
            font-weight: normal;
            line-height: 0.9;
            margin: 0;
            flex: 0 0 auto; /* Don't grow, don't shrink, stay compact */
            margin-right: 40px;
        }

        /* --- Banner Section --- */
        .banner-container {
            flex: 1; /* Take up remaining space next to logo */
            position: relative;
        }

        .banner-image {
            width: 100%;
            height: auto;
            display: block;
        }

        .banner-caption {
            font-size: 28px;
            text-align: center;
            margin-top: 20px;
            font-weight: normal;
        }

        /* --- Portfolio Sections (Art & Engineering) --- */
        .portfolio-section {
            display: flex;
            justify-content: space-between;
            margin-bottom: 60px;
            gap: 20px;
        }

        .portfolio-column {
            width: 48%; /* Almost half the width */
        }

        .portfolio-header {
            text-align: center;
            font-family: sans-serif; /* Clean font for labels */
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        /* Grid for project images */
        .project-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 columns for large screens */
            gap: 15px;
        }

        .project-item {
            position: relative;
            overflow: hidden;
            background-color: #f0f0f0; /* Placeholder background */
        }

        /* Maintain 1:1 aspect ratio for squares */
        .project-item::after {
            content: "";
            display: block;
            padding-bottom: 100%;
        }

        .project-item img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Cover the square area */
            border: 1px solid #ddd;
        }

        /* --- Intro Text --- */
        .intro-text {
            text-align: center;
            font-family: sans-serif;
            font-size: 16px;
            margin: 0 auto 60px auto;
            max-width: 800px;
            color: #555;
        }

        /* --- Footer --- */
        .footer {
            text-align: center;
            font-family: sans-serif;
            font-size: 14px;
            color: #888;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        /* --- Responsive Adjustments for Mobile --- */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                align-items: center;
            }

            .logo-text {
                margin-right: 0;
                margin-bottom: 20px;
                font-size: 48px;
                text-align: center;
            }

            .banner-caption {
                font-size: 20px;
            }

            .portfolio-section {
                flex-direction: column;
            }

            .portfolio-column {
                width: 100%;
                margin-bottom: 40px;
            }

            .project-grid {
                grid-template-columns: repeat(2, 1fr); /* 2 columns on mobile */
            }
        }
    </style>
</head>
<body>

    <div class="main-container">

        <header class="header">
            <h1 class="logo-text">DePew<br>Designs</h1>
            <div class="banner-container">
                <img src="path/to/your/family_banner.jpg" alt="The DePew Family in a daffodil field" class="banner-image">
            </div>
        </header>

        <div class="banner-caption">
            Artistry and Engineering: By the DePew Family
        </div>

        <hr style="border: 0; border-top: 1px solid #eee; margin: 40px 0;">

        <main class="portfolio-section">

            <section class="portfolio-column">
                <h2 class="portfolio-header">ART</h2>
                <div class="project-grid">
                    <div class="project-item"><img src="path/to/your/art1_watercolor.jpg" alt="Watercolor landscape"></div>
                    <div class="project-item"><img src="path/to/your/art2_sculpture.jpg" alt="Abstract metal sculpture"></div>
                    <div class="project-item"><img src="path/to/your/art3_pottery.jpg" alt="Ceramic pot"></div>
                    <div class="project-item"><img src="path/to/your/art4_woodcarving.jpg" alt="Woodcarving of a face"></div>
                </div>
            </section>

            <section class="portfolio-column">
                <h2 class="portfolio-header">ENGINEERING</h2>
                <div class="project-grid">
                    <div class="project-item"><img src="path/to/your/eng1_blueprint.jpg" alt="Technical drawing blueprint"></div>
                    <div class="project-item"><img src="path/to/your/eng2_robot.jpg" alt="Robotic arm model"></div>
                    <div class="project-item"><img src="path/to/your/eng3_bridge.jpg" alt="3D bridge model"></div>
                    <div class="project-item"><img src="path/to/your/eng4_gears.jpg" alt="3D gear mechanism"></div>
                </div>
            </section>

        </main>

        <div class="intro-text">
            Welcome to DePew Designs, showcasing our family's creative and technical explorations.
        </div>

        <footer class="footer">
            &copy; DePew Designs 2024
        </footer>

    </div>

</body>
</html>
